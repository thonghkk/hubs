<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPA Learning System — Học Phát Âm Tiếng Anh</title>
  <meta name="description" content="Chương trình học IPA toàn diện: 44 bài học phát âm tiếng Anh từ cơ bản đến nâng cao, có Tongue Twister, Shadowing, Minimal Pairs và Checklist tự đánh giá." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg-primary: #0d0f14;
      --bg-secondary: #13161e;
      --bg-card: #1a1e2a;
      --bg-card-hover: #1f2436;
      --bg-sidebar: #111420;
      --border: #252a38;
      --border-subtle: #1e2230;
      --text-primary: #e8eaf0;
      --text-secondary: #8b90a7;
      --text-muted: #555d7a;
      --accent-blue: #4f8ef7;
      --accent-blue-dim: #1a2d52;
      --accent-purple: #a855f7;
      --accent-purple-dim: #2d1a52;
      --accent-green: #22c55e;
      --accent-green-dim: #0f2e1c;
      --accent-amber: #f59e0b;
      --accent-amber-dim: #2e1f05;
      --accent-red: #ef4444;
      --accent-red-dim: #2e1010;
      --accent-cyan: #06b6d4;
      --accent-cyan-dim: #042830;
      --stage1: #4f8ef7;
      --stage2: #a855f7;
      --stage3: #22c55e;
      --stage4: #f59e0b;
      --stage5: #ef4444;
      --stage6: #06b6d4;
      --sidebar-width: 300px;
      --header-height: 64px;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 4px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ===== HEADER ===== */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .app-logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #4f8ef7, #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: white;
      font-family: 'JetBrains Mono', monospace;
    }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .logo-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .progress-badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px;
    }
    .progress-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .menu-btn {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 18px;
    }

    /* ===== LAYOUT ===== */
    .app-layout {
      display: flex;
      padding-top: var(--header-height);
      min-height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      position: fixed;
      top: var(--header-height);
      bottom: 0;
      left: 0;
      overflow-y: auto;
      padding: 16px 0;
      z-index: 50;
      transition: transform 0.3s ease;
    }
    .sidebar.collapsed { transform: translateX(-100%); }

    .sidebar-section { margin-bottom: 8px; }
    .sidebar-stage-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      border-radius: 0;
      transition: background 0.15s;
    }
    .sidebar-stage-header:hover { background: var(--bg-card); }
    .stage-badge {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .stage-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); flex: 1; }
    .stage-chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
    .stage-chevron.open { transform: rotate(90deg); }

    .sidebar-items { display: none; }
    .sidebar-items.open { display: block; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px 9px 28px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      font-size: 13px; color: var(--text-secondary);
    }
    .sidebar-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .sidebar-item.active {
      color: var(--text-primary);
      background: var(--bg-card);
    }
    .ipa-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
      flex-shrink: 0;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      min-height: calc(100vh - var(--header-height));
    }

    /* ===== HOME PAGE ===== */
    .home-page { padding: 48px 40px; max-width: 1100px; margin: 0 auto; }
    .home-hero {
      text-align: center;
      padding: 64px 0 48px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-blue-dim);
      border: 1px solid var(--accent-blue);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px; color: var(--accent-blue);
      font-weight: 600;
      margin-bottom: 24px;
    }
    .hero-title {
      font-size: 52px; font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #e8eaf0 0%, #8b90a7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .hero-title .accent { background: linear-gradient(135deg, #4f8ef7, #a855f7); -webkit-background-clip: text; }
    .hero-subtitle { font-size: 18px; color: var(--text-secondary); max-width: 600px; margin: 0 auto 40px; line-height: 1.6; }
    .hero-stats {
      display: flex; justify-content: center; gap: 40px;
      margin-bottom: 48px;
    }
    .stat-item { text-align: center; }
    .stat-number { font-size: 32px; font-weight: 800; color: var(--text-primary); }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .stages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .stage-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .stage-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stage-card:hover { border-color: var(--border-hover, var(--border)); transform: translateY(-2px); box-shadow: var(--shadow); }
    .stage-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .stage-num { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }
    .stage-title { font-size: 16px; font-weight: 700; }
    .stage-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
    .stage-sounds {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .sound-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    /* ===== LESSON PAGE ===== */
    .lesson-page { padding: 32px 40px; max-width: 900px; margin: 0 auto; }
    .lesson-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 24px;
    }
    .breadcrumb-sep { color: var(--text-muted); }
    .breadcrumb-link { cursor: pointer; }
    .breadcrumb-link:hover { color: var(--text-primary); }

    .lesson-header {
      display: flex; align-items: flex-start; gap: 24px;
      margin-bottom: 36px;
      padding: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .lesson-ipa-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 56px; font-weight: 700;
      line-height: 1;
      min-width: 120px;
      text-align: center;
    }
    .lesson-meta { flex: 1; }
    .lesson-stage-tag {
      display: inline-flex;
      font-size: 11px; font-weight: 700;
      padding: 4px 10px;
      border-radius: 5px;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .lesson-title-main { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .lesson-subtitle { font-size: 14px; color: var(--text-secondary); }
    .lesson-nav {
      display: flex; gap: 8px; margin-top: 16px;
    }
    .nav-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .nav-btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
    .nav-btn.primary:hover { opacity: 0.9; }

    /* ===== MARKDOWN RENDERED CONTENT ===== */
    .lesson-content { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .lesson-content h1 { display: none; }
    .lesson-content h2 {
      font-size: 17px; font-weight: 700;
      color: var(--text-primary);
      margin: 32px 0 14px;
      padding: 14px 18px;
      background: var(--bg-card);
      border-left: 4px solid var(--accent-blue);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      display: flex; align-items: center; gap: 10px;
    }
    .lesson-content h3 {
      font-size: 14px; font-weight: 600;
      color: var(--text-secondary);
      margin: 20px 0 10px;
      letter-spacing: 0.3px;
    }
    .lesson-content p {
      font-size: 15px; color: var(--text-secondary);
      line-height: 1.8; margin-bottom: 14px;
    }
    .lesson-content strong { color: var(--text-primary); font-weight: 600; }
    .lesson-content em { color: var(--accent-blue); font-style: italic; }

    /* Tables */
    .lesson-content table {
      width: 100%; border-collapse: collapse;
      margin: 16px 0 20px;
      border-radius: var(--radius-sm); overflow: hidden;
      font-size: 14px;
    }
    .lesson-content th {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 600; font-size: 12px;
      letter-spacing: 0.5px;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .lesson-content td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }
    .lesson-content tr:last-child td { border-bottom: none; }
    .lesson-content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .lesson-content tr:hover td { background: var(--bg-card-hover); }
    .lesson-content tbody tr:first-child td { background: rgba(79,142,247,0.06); }

    /* Code / IPA blocks */
    .lesson-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: var(--radius-xs);
      color: var(--accent-blue);
    }
    .lesson-content pre {
      background: linear-gradient(135deg, var(--accent-blue-dim), var(--accent-purple-dim));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 32px;
      margin: 16px 0;
      text-align: center;
    }
    .lesson-content pre code {
      font-size: 48px; font-weight: 700;
      background: none; border: none; padding: 0;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Blockquotes — tips, notes */
    .lesson-content blockquote {
      border-left: 4px solid var(--accent-amber);
      background: var(--accent-amber-dim);
      padding: 12px 18px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 14px 0;
      font-size: 14px; color: var(--text-secondary);
      line-height: 1.7;
    }
    .lesson-content blockquote strong { color: var(--accent-amber); }

    /* Lists */
    .lesson-content ul, .lesson-content ol {
      padding-left: 22px; margin: 12px 0;
    }
    .lesson-content li {
      font-size: 14px; color: var(--text-secondary);
      margin-bottom: 7px; line-height: 1.7;
    }
    .lesson-content li strong { color: var(--text-primary); }

    /* HR */
    .lesson-content hr {
      border: none; border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ===== SECTION STYLING for h2 numbering ===== */
    .lesson-content h2:nth-of-type(1) { border-left-color: var(--accent-blue); }
    .lesson-content h2:nth-of-type(2) { border-left-color: var(--accent-purple); }
    .lesson-content h2:nth-of-type(3) { border-left-color: var(--accent-green); }
    .lesson-content h2:nth-of-type(4) { border-left-color: var(--accent-amber); }
    .lesson-content h2:nth-of-type(5) { border-left-color: var(--accent-cyan); }
    .lesson-content h2:nth-of-type(6) { border-left-color: #f472b6; }
    .lesson-content h2:nth-of-type(7) { border-left-color: var(--accent-red); }
    .lesson-content h2:nth-of-type(8) { border-left-color: var(--accent-blue); }
    .lesson-content h2:nth-of-type(9) { border-left-color: var(--accent-purple); }
    .lesson-content h2:nth-of-type(10) { border-left-color: var(--accent-green); }
    .lesson-content h2:nth-of-type(11) { border-left-color: var(--accent-amber); }
    .lesson-content h2:nth-of-type(12) { border-left-color: var(--accent-cyan); }

    /* ===== LOADING ===== */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 400px; gap: 16px;
      color: var(--text-muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 400px; gap: 12px;
      color: var(--text-muted); text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 8px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); }
    .empty-desc { font-size: 14px; max-width: 400px; line-height: 1.6; }

    /* ===== TOC FLOATING ===== */
    .toc-float {
      position: fixed;
      right: 24px; top: 96px;
      width: 220px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      z-index: 40;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    .toc-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 10px; }
    .toc-item {
      font-size: 12px; color: var(--text-muted);
      padding: 5px 8px;
      cursor: pointer;
      border-radius: var(--radius-xs);
      transition: all 0.15s;
      line-height: 1.4;
    }
    .toc-item:hover { background: var(--bg-card-hover); color: var(--text-secondary); }
    .toc-item.active { color: var(--accent-blue); background: var(--accent-blue-dim); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1200px) {
      .toc-float { display: none; }
    }
    @media (max-width: 768px) {
      .menu-btn { display: flex; }
      .sidebar {
        transform: translateX(-100%);
        z-index: 200;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 190;
        display: none;
      }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0; }
      .home-page, .lesson-page { padding: 24px 16px; }
      .hero-title { font-size: 36px; }
      .hero-stats { gap: 24px; }
      .lesson-header { flex-direction: column; }
      .lesson-ipa-display { font-size: 40px; min-width: auto; }
    }
  </style>
</head>

<!-- HEADER -->
<header class="app-header">

    </div>
  </div>
  <div class="header-actions">
    <div class="progress-badge">
      <span class="progress-dot"></span>
      <span id="progressLabel">44 bài học</span>
    </div>
    <button class="menu-btn" id="menuBtn">☰</button>
  </div>
</header>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">

  </nav>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">

  </main>

<script>
// ===== DATA =====
const STAGES = [
  {

      { ipa: "/ɒ/", name: "Short O", file: "stage1/05-short-o.md" },

  {
    id: 2,

    emoji: "🟣",
    desc: "5 nguyên âm dài — âm kéo dài và rõ ràng",
    lessons: [
      { ipa: "/iː/", name: "Long EE", file: "stage2/01-long-ee.md" },
      { ipa: "/ɑː/", name: "Long AH", file: "stage2/02-long-ah.md" },
      { ipa: "/ɔː/", name: "Long AW", file: "stage2/03-long-aw.md" },
      { ipa: "/uː/", name: "Long OO", file: "stage2/04-long-oo.md" },
      { ipa: "/ɜː/", name: "Long ER", file: "stage2/05-long-er.md" },

  },
  {
    id: 3,
    name: "Diphthongs",
    nameEn: "Diphthongs",
    color: "#22c55e",

// ===== STATE =====
let currentLesson = null;
let currentStage = null;
let sidebarOpen = {1:true,2:false,3:false,4:false,5:false,6:false};

// ===== SIDEBAR BUILD =====
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = STAGES.map(stage => `
    <div class="sidebar-section">
      <div class="sidebar-stage-header" onclick="toggleStage(${stage.id})">
        <div class="stage-badge" style="background:${stage.colorDim};color:${stage.color}">
          ${stage.id}
        </div>
        <div class="stage-label">${stage.name}</div>
        <span class="stage-chevron ${sidebarOpen[stage.id]?'open':''}" id="chevron-${stage.id}">▶</span>
      </div>
      <div class="sidebar-items ${sidebarOpen[stage.id]?'open':''}" id="stage-items-${stage.id}">
        ${stage.lessons.map((lesson, idx) => `
          <div class="sidebar-item" id="sidebar-${stage.id}-${idx}"
               onclick="loadLesson(${stage.id}, ${idx})"
               style="${currentStage===stage.id && currentLesson===idx ? `border-left-color:${stage.color};background:var(--bg-card);color:var(--text-primary)` : ''}">
            <span class="ipa-chip" style="background:${stage.colorDim};color:${stage.color}">${lesson.ipa}</span>
            <span>${lesson.name}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleStage(stageId) {
  sidebarOpen[stageId] = !sidebarOpen[stageId];
  buildSidebar();
}

// ===== LOAD LESSON =====
async function loadLesson(stageId, lessonIdx) {
  currentStage = stageId;
  currentLesson = lessonIdx;
  sidebarOpen[stageId] = true;
  buildSidebar();

  const stage = STAGES[stageId - 1];
  const lesson = stage.lessons[lessonIdx];
  const main = document.getElementById('mainContent');

  // Loading
  main.innerHTML = `
    <div class="lesson-page">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Đang tải bài học ${lesson.ipa}…</div>
      </div>
    </div>
  `;

  // Load markdown
  try {
    const resp = await fetch('../hubs/ipaHubs/' + lesson.file);
    if (!resp.ok) throw new Error('not found');
    const md = await resp.text();
    renderLesson(stageId, lessonIdx, lesson, stage, md);
  } catch(e) {
    renderLessonEmpty(stageId, lessonIdx, lesson, stage);
  }
}

// ===== RENDER LESSON =====
function renderLesson(stageId, lessonIdx, lesson, stage, md) {
  const main = document.getElementById('mainContent');
  const allLessons = STAGES.flatMap(s => s.lessons.map(l => ({...l, stageId: s.id})));
  const currentFlat = allLessons.findIndex(l => l.file === lesson.file);
  const prevLesson = currentFlat > 0 ? allLessons[currentFlat - 1] : null;
  const nextLesson = currentFlat < allLessons.length - 1 ? allLessons[currentFlat + 1] : null;

  const html = marked.parse(md);

  main.innerHTML = `
    <div class="lesson-page">
      <div class="lesson-breadcrumb">
        <span class="breadcrumb-link" onclick="showHome()">🏠 Trang chủ</span>
        <span class="breadcrumb-sep">›</span>
        <span style="color:${stage.color}">Giai đoạn ${stageId}: ${stage.name}</span>
        <span class="breadcrumb-sep">›</span>
        <span style="font-family:'JetBrains Mono',monospace">${lesson.ipa}</span>
      </div>

      <div class="lesson-header">
        <div class="lesson-ipa-display" style="color:${stage.color}">${lesson.ipa}</div>
        <div class="lesson-meta">
          <div class="lesson-stage-tag" style="background:${stage.colorDim};color:${stage.color}">
            GĐ ${stageId} — ${stage.nameEn}
          </div>
          <div class="lesson-title-main">${lesson.name}</div>
          <div class="lesson-subtitle">Bài ${lessonIdx + 1} / ${stage.lessons.length} trong giai đoạn này</div>
          <div class="lesson-nav">
            <button class="nav-btn" onclick="showHome()">← Trang chủ</button>
            ${prevLesson ? `<button class="nav-btn" onclick="loadLesson(${prevLesson.stageId}, ${findLessonIdx(prevLesson)})">‹ Bài trước</button>` : ''}
            ${nextLesson ? `<button class="nav-btn primary" onclick="loadLesson(${nextLesson.stageId}, ${findLessonIdx(nextLesson)})">Bài tiếp theo ›</button>` : '<span style="padding:8px 16px;font-size:13px;color:var(--accent-green)">🎉 Hoàn thành!</span>'}
          </div>
        </div>
      </div>

      <div class="lesson-content" id="lessonBody">
        ${html}
      </div>

      <div style="margin-top:40px;padding:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:14px;color:var(--text-muted)">
          ${prevLesson ? `<span class="nav-btn" style="cursor:pointer" onclick="loadLesson(${prevLesson.stageId}, ${findLessonIdx(prevLesson)})">‹ ${prevLesson.ipa} ${prevLesson.name}</span>` : ''}
        </div>
        <div style="font-size:14px;color:var(--text-muted)">
          ${nextLesson ? `<span class="nav-btn primary" style="cursor:pointer" onclick="loadLesson(${nextLesson.stageId}, ${findLessonIdx(nextLesson)})">${nextLesson.ipa} ${nextLesson.name} ›</span>` : ''}
        </div>
      </div>
    </div>
  `;

  // Style checkboxes
  setTimeout(() => {
    document.querySelectorAll('.lesson-content input[type="checkbox"]').forEach(cb => {
      cb.style.cssText = 'width:16px;height:16px;margin-right:8px;accent-color:' + stage.color;
    });
  }, 50);
}

function findLessonIdx(lesson) {
  const stage = STAGES[lesson.stageId - 1];
  return stage.lessons.findIndex(l => l.file === lesson.file);
}

function renderLessonEmpty(stageId, lessonIdx, lesson, stage) {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="lesson-page">
      <div class="lesson-breadcrumb">
        <span class="breadcrumb-link" onclick="showHome()">🏠 Trang chủ</span>
        <span class="breadcrumb-sep">›</span>
        <span style="color:${stage.color}">Giai đoạn ${stageId}: ${stage.name}</span>
      </div>
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="lesson-ipa-display" style="color:${stage.color};font-size:64px">${lesson.ipa}</div>
        <div class="empty-title">${lesson.name} — Đang chuẩn bị</div>
        <div class="empty-desc">Bài học này đang được agent tạo nội dung. Vui lòng quay lại sau ít phút và refresh trang!</div>
        <button class="nav-btn primary" onclick="showHome()" style="margin-top:16px">← Về trang chủ</button>
      </div>
    </div>
  `;
}
